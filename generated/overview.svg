<svg width="420" height="320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#58a6ff" />
    <stop offset="100%" style="stop-color:#bc8cff" />
  </linearGradient>
  <linearGradient id="grade-glow" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8b949e" stop-opacity="0.15" />
    <stop offset="100%" stop-color="#8b949e" stop-opacity="0.05" />
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feMerge>
      <feMergeNode in="blur" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>
</defs>
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
}

#card {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  fill: #0d1117;
  stroke: #21262d;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

.accent-bar { fill: url(#accent); }

.title {
  font-size: 15px;
  font-weight: 600;
  fill: #e6edf3;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
}

.subtitle {
  font-size: 11px;
  fill: #8b949e;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.1s;
}

.stat-label {
  font-size: 11.5px;
  fill: #8b949e;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  fill: #e6edf3;
}

.section-label {
  font-size: 10px;
  fill: #484f58;
  letter-spacing: 1px;
}

.icon { fill: #58a6ff; }

.grade-bg {
  fill: url(#grade-glow);
  stroke: #8b949e;
  stroke-width: 2;
  rx: 12px;
  ry: 12px;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.3s;
}

.grade-text {
  font-size: 20px;
  font-weight: 800;
  text-anchor: middle;
  dominant-baseline: central;
  filter: url(#glow);
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.3s;
}

.grade-label {
  font-size: 9px;
  fill: #8b949e;
  text-anchor: middle;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.35s;
}

.item {
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

.d1 { animation-delay: 0.15s; }
.d2 { animation-delay: 0.25s; }
.d3 { animation-delay: 0.35s; }
.d4 { animation-delay: 0.45s; }
.d5 { animation-delay: 0.55s; }
.d6 { animation-delay: 0.65s; }

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>

<rect x="1" y="1" id="card" />
<rect x="1" y="1" width="418" height="3" rx="10" ry="10" class="accent-bar" />
<rect x="1" y="4" width="418" height="2" fill="#0d1117" />

<!-- Header -->
<text x="24" y="32" class="title">EricLuec</text>
<text x="24" y="46" class="subtitle">March 2026</text>

<!-- Grade badge -->
<rect x="348" y="14" width="56" height="44" class="grade-bg" />
<text x="376" y="36" class="grade-text" fill="#8b949e">C</text>
<text x="376" y="72" class="grade-label">GRADE</text>

<line x1="24" y1="56" x2="340" y2="56" stroke="#21262d" stroke-width="0.5" />

<!-- Monthly stats row -->
<text x="24" y="76" class="section-label item d1">THIS MONTH</text>

<g transform="translate(24, 84)" class="item d2">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M1 2.5A2.5 2.5 0 013.5 0h8.75a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0V1.5h-8a1 1 0 00-1 1v6.708A2.492 2.492 0 013.5 9h3.25a.75.75 0 010 1.5H3.5a1 1 0 100 2h5.75a.75.75 0 010 1.5H3.5A2.5 2.5 0 011 11.5v-9zm13.23 7.79a.75.75 0 001.06-1.06l-2.505-2.505a.75.75 0 00-1.06 0L9.22 9.229a.75.75 0 001.06 1.061l1.225-1.224v6.184a.75.75 0 001.5 0V9.066l1.224 1.224z"></path></svg>
  <text x="18" y="11" class="stat-label">Contributions</text>
  <text x="0" y="36" class="stat-value">1,085</text>
</g>

<g transform="translate(220, 84)" class="item d2">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"></path></svg>
  <text x="18" y="11" class="stat-label">Pull Requests</text>
  <text x="0" y="36" class="stat-value">161</text>
</g>

<!-- All-time stats -->
<line x1="24" y1="140" x2="396" y2="140" stroke="#21262d" stroke-width="0.5" />
<text x="24" y="160" class="section-label item d3">ALL TIME</text>

<!-- Row 1: Contributions, PRs, Issues Closed -->
<g transform="translate(24, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M1 2.5A2.5 2.5 0 013.5 0h8.75a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0V1.5h-8a1 1 0 00-1 1v6.708A2.492 2.492 0 013.5 9h3.25a.75.75 0 010 1.5H3.5a1 1 0 100 2h5.75a.75.75 0 010 1.5H3.5A2.5 2.5 0 011 11.5v-9zm13.23 7.79a.75.75 0 001.06-1.06l-2.505-2.505a.75.75 0 00-1.06 0L9.22 9.229a.75.75 0 001.06 1.061l1.225-1.224v6.184a.75.75 0 001.5 0V9.066l1.224 1.224z"></path></svg>
  <text x="18" y="11" class="stat-label">Contributions</text>
  <text x="0" y="36" class="stat-value">2,738</text>
</g>

<g transform="translate(155, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"></path></svg>
  <text x="18" y="11" class="stat-label">Pull Requests</text>
  <text x="0" y="36" class="stat-value">171</text>
</g>

<g transform="translate(286, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm11.28-1.72a.75.75 0 00-1.06-1.06L7 8.44 5.78 7.22a.75.75 0 00-1.06 1.06l1.75 1.75a.75.75 0 001.06 0l3.75-3.75z"></path></svg>
  <text x="18" y="11" class="stat-label">Issues Closed</text>
  <text x="0" y="36" class="stat-value">464</text>
</g>

<!-- Row 2: Stars, Streak -->
<g transform="translate(24, 232)" class="item d5">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path></svg>
  <text x="18" y="11" class="stat-label">Stars</text>
  <text x="0" y="36" class="stat-value">1</text>
</g>

<g transform="translate(155, 232)" class="item d5">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M8.53 1.22a.75.75 0 00-1.06 0L3.72 4.97a.75.75 0 001.06 1.06l2.47-2.47v6.69a.75.75 0 001.5 0V3.56l2.47 2.47a.75.75 0 101.06-1.06L8.53 1.22zM3.75 13a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z"></path></svg>
  <text x="18" y="11" class="stat-label">Current Streak</text>
  <text x="0" y="36" class="stat-value">5 days</text>
</g>

</svg>
