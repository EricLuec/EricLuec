<svg width="420" height="235" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#58a6ff" />
    <stop offset="100%" style="stop-color:#bc8cff" />
  </linearGradient>
</defs>
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
}

#card {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  fill: #0d1117;
  stroke: #21262d;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

.accent-bar { fill: url(#accent); }

.title {
  font-size: 15px;
  font-weight: 600;
  fill: #e6edf3;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
}

.subtitle {
  font-size: 11px;
  fill: #8b949e;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.1s;
}

.stat-label {
  font-size: 11.5px;
  fill: #8b949e;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  fill: #e6edf3;
}

.section-label {
  font-size: 10px;
  fill: #484f58;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.icon { fill: #58a6ff; }

.grade-circle {
  fill: none;
  stroke-width: 2.5;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.3s;
}

.grade-text {
  font-size: 22px;
  font-weight: 800;
  text-anchor: middle;
  dominant-baseline: central;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.3s;
}

.grade-label {
  font-size: 9px;
  fill: #8b949e;
  text-anchor: middle;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: 0.35s;
}

.item {
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

.d1 { animation-delay: 0.15s; }
.d2 { animation-delay: 0.25s; }
.d3 { animation-delay: 0.35s; }
.d4 { animation-delay: 0.45s; }
.d5 { animation-delay: 0.55s; }

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>

<rect x="1" y="1" id="card" />
<rect x="1" y="1" width="418" height="3" rx="10" ry="10" class="accent-bar" />
<rect x="1" y="4" width="418" height="2" fill="#0d1117" />

<!-- Header -->
<text x="24" y="32" class="title">EricLuec</text>
<text x="24" y="46" class="subtitle">March 2026</text>

<!-- Grade badge -->
<circle cx="382" cy="36" r="22" class="grade-circle" stroke="#8b949e" />
<text x="382" y="36" class="grade-text" fill="#8b949e">C</text>
<text x="382" y="70" class="grade-label">COMMIT GRADE</text>

<line x1="24" y1="56" x2="340" y2="56" stroke="#21262d" stroke-width="0.5" />

<!-- Monthly stats row -->
<text x="24" y="76" class="section-label item d1">THIS MONTH</text>

<g transform="translate(24, 84)" class="item d2">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M1 2.5A2.5 2.5 0 013.5 0h8.75a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0V1.5h-8a1 1 0 00-1 1v6.708A2.492 2.492 0 013.5 9h3.25a.75.75 0 010 1.5H3.5a1 1 0 100 2h5.75a.75.75 0 010 1.5H3.5A2.5 2.5 0 011 11.5v-9zm13.23 7.79a.75.75 0 001.06-1.06l-2.505-2.505a.75.75 0 00-1.06 0L9.22 9.229a.75.75 0 001.06 1.061l1.225-1.224v6.184a.75.75 0 001.5 0V9.066l1.224 1.224z"></path></svg>
  <text x="18" y="11" class="stat-label">Contributions</text>
  <text x="0" y="36" class="stat-value">281</text>
</g>

<g transform="translate(140, 84)" class="item d2">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M11.93 8.5a4.002 4.002 0 01-7.86 0H.75a.75.75 0 010-1.5h3.32a4.002 4.002 0 017.86 0h3.32a.75.75 0 010 1.5h-3.32zm-1.43-.75a2.5 2.5 0 10-5 0 2.5 2.5 0 005 0z"></path></svg>
  <text x="18" y="11" class="stat-label">Commits</text>
  <text x="0" y="36" class="stat-value">6</text>
</g>

<g transform="translate(256, 84)" class="item d2">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"></path></svg>
  <text x="18" y="11" class="stat-label">Pull Requests</text>
  <text x="0" y="36" class="stat-value">1</text>
</g>

<!-- All-time stats row -->
<line x1="24" y1="140" x2="396" y2="140" stroke="#21262d" stroke-width="0.5" />
<text x="24" y="160" class="section-label item d3">ALL TIME</text>

<g transform="translate(24, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path></svg>
  <text x="18" y="11" class="stat-label">Stars</text>
  <text x="0" y="36" class="stat-value">1</text>
</g>

<g transform="translate(140, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"></path></svg>
  <text x="18" y="11" class="stat-label">Forks</text>
  <text x="0" y="36" class="stat-value">0</text>
</g>

<g transform="translate(256, 168)" class="item d4">
  <svg class="icon" viewBox="0 0 16 16" width="13" height="13"><path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"></path></svg>
  <text x="18" y="11" class="stat-label">Repositories</text>
  <text x="0" y="36" class="stat-value">37</text>
</g>

</svg>
