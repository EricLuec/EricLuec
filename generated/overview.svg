<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
}

#card {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  fill: #0d1117;
  stroke: #21262d;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

.accent-bar { fill: url(#accent); }

.title {
  font-size: 15px;
  font-weight: 600;
  fill: #e6edf3;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
}

.stat-label {
  font-size: 12px;
  fill: #8b949e;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  fill: #e6edf3;
}

.icon { fill: #58a6ff; }

.item {
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

.item:nth-child(1) { animation-delay: 0.15s; }
.item:nth-child(2) { animation-delay: 0.25s; }
.item:nth-child(3) { animation-delay: 0.35s; }
.item:nth-child(4) { animation-delay: 0.45s; }
.item:nth-child(5) { animation-delay: 0.55s; }
.item:nth-child(6) { animation-delay: 0.65s; }

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>

